<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식구독러너</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#0f0f0f;color:#fff;min-height:100vh;}
.container{max-width:980px;margin:0 auto;padding:20px;}
header{text-align:center;padding:24px 0;border-bottom:1px solid #222;margin-bottom:20px;}
header h1{font-size:26px;}header h1 span{color:#ff4444;}
header p{color:#666;font-size:13px;margin-top:5px;}

.box{background:#1a1a1a;border-radius:12px;padding:16px;margin-bottom:14px;}
.input-group label{display:block;font-size:11px;color:#888;margin-bottom:4px;}
.input-group input{width:100%;padding:9px 12px;background:#222;border:1px solid #333;border-radius:8px;color:#fff;font-size:13px;font-family:monospace;}
.input-group input:focus{outline:none;border-color:#ff4444;}

.toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.toggle-switch{position:relative;width:44px;height:22px;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#333;transition:.3s;border-radius:22px;}
.toggle-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;transition:.3s;border-radius:50%;}
.toggle-switch input:checked+.toggle-slider{background:#4CAF50;}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(22px);}
.sdot{width:7px;height:7px;border-radius:50%;background:#ff4444;display:inline-block;margin-right:4px;}
.sdot.on{background:#4CAF50;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px;}
.stat-box{background:#1a1a1a;padding:11px;border-radius:10px;text-align:center;}
.stat-box .val{font-size:20px;font-weight:bold;color:#ff4444;}
.stat-box .lbl{font-size:10px;color:#666;margin-top:2px;}

.controls{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;}
.btn{padding:8px 14px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
.btn-red{background:#ff4444;color:#fff;}.btn-red:hover{background:#ff6666;}
.btn-orange{background:#e65c00;color:#fff;}.btn-orange:hover{background:#ff6d00;}
.btn-gray{background:#2a2a2a;color:#ccc;border:1px solid #333;}.btn-gray:hover{background:#333;}
.btn-green{background:#1b5e20;color:#fff;}.btn-green:hover{background:#2e7d32;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

.add-form{display:none;background:#111;border-radius:10px;padding:12px;margin-bottom:12px;gap:8px;flex-wrap:wrap;}
.add-form.show{display:flex;}
.add-form input{flex:1;min-width:120px;padding:8px 11px;background:#222;border:1px solid #333;border-radius:7px;color:#fff;font-size:13px;}

/* 타입 필터 */
.type-filter{display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
.type-filter label{font-size:12px;color:#888;}
.type-chk{display:flex;align-items:center;gap:5px;padding:5px 12px;background:#1a1a1a;border-radius:20px;cursor:pointer;border:1px solid #333;font-size:12px;transition:all .2s;}
.type-chk input{accent-color:#ff4444;width:14px;height:14px;}
.type-chk.shorts-chk{border-color:#9c27b0;}.type-chk.shorts-chk.active{background:#1a0a2a;color:#ce93d8;}
.type-chk.video-chk{border-color:#2196f3;}.type-chk.video-chk.active{background:#0a1020;color:#90caf9;}
.type-chk.live-chk{border-color:#f44336;}.type-chk.live-chk.active{background:#1a0a0a;color:#ef9a9a;}

.tabs{display:flex;gap:5px;margin-bottom:12px;}
.tab-btn{padding:7px 18px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;background:#222;color:#666;transition:all .2s;}
.tab-btn.active{background:#ff4444;color:#fff;}

.progress-bar{background:#1a1a1a;border-radius:10px;height:16px;margin-bottom:14px;overflow:hidden;}
.progress-fill{background:linear-gradient(90deg,#ff4444,#ff6b6b);height:100%;transition:width .3s;display:flex;align-items:center;justify-content:center;font-size:10px;}

.channel-list{display:flex;flex-direction:column;gap:7px;}
.channel-card{background:#1a1a1a;border-radius:11px;padding:12px 15px;display:flex;align-items:center;gap:10px;border:2px solid transparent;transition:all .2s;}
.channel-card:hover{background:#1f1f1f;}
.channel-card.selected{border-color:#ff4444;background:#160808;}
.channel-card.learning{border-color:#4CAF50;background:#081408;}
.channel-card.done-card{opacity:.7;}
.channel-card input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#ff4444;flex-shrink:0;}

.ch-info{flex:1;min-width:0;}
.ch-name{font-size:14px;font-weight:600;}
.ch-sub{font-size:11px;color:#666;margin-top:2px;}
.ch-badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:8px;margin-left:6px;vertical-align:middle;}
.ch-badge.done{background:#1b3a1b;color:#4CAF50;}
.ch-badge.learning{background:#1a2a10;color:#8bc34a;}

.ch-counts{font-size:10px;color:#555;display:flex;gap:8px;margin-top:3px;flex-wrap:wrap;}
.ch-counts span{display:flex;align-items:center;gap:3px;}

.mini-prog{min-width:110px;flex-shrink:0;}
.mini-prog-hd{display:flex;justify-content:space-between;font-size:10px;color:#555;margin-bottom:2px;}
.mini-bar{background:#222;border-radius:3px;height:5px;overflow:hidden;}
.mini-bar-fill{height:100%;background:linear-gradient(90deg,#ff4444,#ff6b6b);transition:width .3s;border-radius:3px;}

.ch-acts{display:flex;gap:4px;flex-shrink:0;}
.ch-act{padding:4px 8px;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;}
.ch-act-dl{background:#0d47a1;color:#fff;}
.ch-act-del{background:#1a0000;color:#ff6666;border:1px solid #330000;}

.log-box{background:#1a1a1a;border-radius:12px;padding:16px;margin-top:20px;max-height:300px;overflow-y:auto;}
.log-box h3{margin-bottom:10px;color:#555;font-size:12px;}
.log-entry{font-size:12px;padding:4px 0;border-bottom:1px solid #1f1f1f;color:#777;}
.log-entry .t{color:#444;margin-right:7px;}
.log-entry.success{color:#4CAF50;}.log-entry.error{color:#ff4444;}
.log-entry.info{color:#2196F3;}.log-entry.warning{color:#FFA500;}.log-entry.loading{color:#ab47bc;}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📺 주식<span>구독</span>러너</h1>
    <p>유튜브 채널 자막 자동 수집 시스템</p>
  </header>

  <div class="box">
    <div class="toggle-row">
      <label>🚀 서버학습:</label>
      <label class="toggle-switch"><input type="checkbox" id="serverToggle" checked><span class="toggle-slider"></span></label>
      <span id="serverLabel"><span class="sdot on"></span>서버 연결됨</span>
    </div>
    <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;">
      <div class="input-group" style="flex:1;">
        <label>YouTube API 키</label>
        <div style="display:flex;gap:6px;">
          <input type="text" id="apiKey" placeholder="AIza...">
          <button class="btn btn-gray" onclick="clearApiKey()" style="padding:8px 10px;">🗑️</button>
        </div>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-box"><div class="val" id="sTotalCh">0</div><div class="lbl">전체채널</div></div>
    <div class="stat-box"><div class="val" id="sLearned">0</div><div class="lbl">완료채널</div></div>
    <div class="stat-box"><div class="val" id="sTotalVid">0</div><div class="lbl">총영상수</div></div>
    <div class="stat-box"><div class="val" id="sLearnedVid">0</div><div class="lbl">학습영상</div></div>
    <div class="stat-box"><div class="val" id="sSelected">0</div><div class="lbl">선택됨</div></div>
  </div>

  <div class="controls">
    <button class="btn btn-red" id="learnBtn" disabled>▶ 학습 시작</button>
    <button class="btn btn-orange" id="autoBtn">⚡ 자동학습</button>
    <button class="btn" id="stopBtn" style="background:#555;color:#fff;display:none;">⏹ 중지</button>
    <button class="btn btn-gray" id="selAllBtn">전체선택</button>
    <button class="btn btn-gray" id="deselAllBtn">전체해제</button>
    <button class="btn btn-green" id="addBtn">+ 채널추가</button>
    <button class="btn btn-gray" id="resetBtn">🔄 초기화</button>
  </div>

  <!-- 채널 추가 폼 -->
  <div class="add-form" id="addForm">
    <input id="newName" placeholder="채널명 (예: 주식단테)">
    <input id="newCid" placeholder="채널ID (UCxxxx...)">
    <input id="newDesc" placeholder="설명 (선택)">
    <button class="btn btn-red" onclick="addChannel()">추가</button>
    <button class="btn btn-gray" onclick="closeAddForm()">취소</button>
  </div>

  <!-- 타입 필터 -->
  <div class="type-filter">
    <label>학습 대상:</label>
    <label class="type-chk shorts-chk active" id="chkShortsLabel">
      <input type="checkbox" id="chkShorts" checked onchange="updateTypeFilter()"> 🩳 쇼츠
    </label>
    <label class="type-chk video-chk active" id="chkVideoLabel">
      <input type="checkbox" id="chkVideo" checked onchange="updateTypeFilter()"> 🎬 동영상
    </label>
    <label class="type-chk live-chk active" id="chkLiveLabel">
      <input type="checkbox" id="chkLive" checked onchange="updateTypeFilter()"> 🔴 라이브
    </label>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab-btn active" id="tabPending" onclick="setTab('pending')">📋 미학습</button>
    <button class="tab-btn" id="tabDone" onclick="setTab('done')">✅ 완료채널</button>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%">0%</div></div>
  <div class="channel-list" id="channelList"></div>

  <div class="log-box">
    <h3>📋 학습 로그</h3>
    <div id="logEntries"></div>
  </div>
</div>

<script>
const LOCAL_SERVER = '';
const STORAGE_KEY = 'sgr_v4';

// 기본 채널 (const → 초기값, 실제는 state.channels)
const DEFAULT_CHANNELS = [
  {id:1,name:"주식카페_주식단테사",desc:"단기장 매매 기법",channelId:"UCBPoQRmiTfeGKWRZFON8XAA"},
  {id:2,name:"주식코주부_주식단테사",desc:"차트분석 단타 전략",channelId:"UCEThjMvSpp_e784LAXG_iAg"},
  {id:3,name:"1분주식",desc:"1분 단타, 초단기 매매",channelId:"UCI9oLnJOXVgcvtvsmzl04gQ"},
  {id:4,name:"주식몬스터",desc:"차트기본, 단타기법",channelId:"UCz-GpeRQbJs5djV0-L-ENQA"},
  {id:5,name:"주식김사부",desc:"부자되는법, 단타기법",channelId:"UCBCZ4ho7wVjq2uLnxtCcYiw"},
  {id:6,name:"주식바바",desc:"VA매매, 333기법",channelId:"UCA8-VnK7ZhdcXXg_Ayin-ug"},
  {id:7,name:"주식박카스",desc:"ETF분석, 투자아이디어",channelId:"UCnD_fNScAjhwIEJvjIVmWdQ"},
  {id:8,name:"주독",desc:"비트코인, 장기투자",channelId:"UCdnKljR85LaltNTQ_Ms7i9A"},
  {id:9,name:"용사부",desc:"단타전략",channelId:"UC-jgYMsPz6NuDT9j9dmNODg"},
  {id:10,name:"주식등대",desc:"차트분석, 투자기법",channelId:"UCM9c85H-8nFIcIP8PvqasZg"},
  {id:11,name:"또사이선생",desc:"스텔스투자, 단테기법",channelId:"UCwiQ2wkrovoZmgUay7GcOiQ"},
  {id:12,name:"또또사이선생",desc:"추가 채널",channelId:"UC-O5GlHmFZK6R6_8kpptZ3A"}
];

let state = {
  channels: [],
  selected: [],
  learned: [],       // 채널 id 배열
  vidCounts: {},     // {chId: {total, learned, shorts, video, live}}
  learning: null,
  learningStatus: '',
  logs: [],
  apiKey: '',
  serverEnabled: true,
  tab: 'pending',
  typeFilter: {shorts: true, video: true, live: true},
  nextId: 13
};

// ── 저장/로드 ──────────────────────────────────────
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    channels: state.channels,
    learned: state.learned,
    vidCounts: state.vidCounts,
    logs: state.logs.slice(0, 80),
    apiKey: state.apiKey,
    serverEnabled: state.serverEnabled,
    typeFilter: state.typeFilter,
    nextId: state.nextId
  }));
}

function loadState() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    const p = JSON.parse(saved);
    state.channels = p.channels || DEFAULT_CHANNELS;
    state.learned = (p.learned || []).map(Number);
    state.vidCounts = p.vidCounts || {};
    state.logs = p.logs || [];
    const k = p.apiKey || '';
    state.apiKey = (k.startsWith('AIza') && k.length < 100) ? k : '';
    state.serverEnabled = p.serverEnabled !== undefined ? p.serverEnabled : true;
    state.typeFilter = p.typeFilter || {shorts:true, video:true, live:true};
    state.nextId = p.nextId || 13;
  } else {
    state.channels = [...DEFAULT_CHANNELS];
  }
  document.getElementById('apiKey').value = state.apiKey;
  document.getElementById('serverToggle').checked = state.serverEnabled;
  document.getElementById('chkShorts').checked = state.typeFilter.shorts;
  document.getElementById('chkVideo').checked = state.typeFilter.video;
  document.getElementById('chkLive').checked = state.typeFilter.live;
  updateTypeFilterUI();
  updateServerLabel();
}

// ── API 키 ─────────────────────────────────────────
function clearApiKey() {
  state.apiKey = '';
  document.getElementById('apiKey').value = '';
  saveState();
  addLog('API 키 초기화됨', 'warning');
}

// ── 서버 토글 ──────────────────────────────────────
document.getElementById('serverToggle').addEventListener('change', () => {
  state.serverEnabled = document.getElementById('serverToggle').checked;
  updateServerLabel();
  saveState();
});
function updateServerLabel() {
  const on = state.serverEnabled;
  document.getElementById('serverLabel').innerHTML =
    `<span class="sdot ${on?'on':''}"></span>${on?'서버 연결됨':'로컬 모드'}`;
}

// ── 타입 필터 ──────────────────────────────────────
function updateTypeFilter() {
  state.typeFilter.shorts = document.getElementById('chkShorts').checked;
  state.typeFilter.video  = document.getElementById('chkVideo').checked;
  state.typeFilter.live   = document.getElementById('chkLive').checked;
  updateTypeFilterUI();
  saveState();
}
function updateTypeFilterUI() {
  ['Shorts','Video','Live'].forEach(t => {
    const el = document.getElementById(`chk${t}Label`);
    const chk = document.getElementById(`chk${t}`);
    if (chk.checked) el.classList.add('active'); else el.classList.remove('active');
  });
}

// ── 탭 ────────────────────────────────────────────
function setTab(tab) {
  state.tab = tab;
  document.getElementById('tabPending').classList.toggle('active', tab==='pending');
  document.getElementById('tabDone').classList.toggle('active', tab==='done');
  renderChannels();
}

// ── 채널 추가/삭제 ─────────────────────────────────
function addChannel() {
  const name = document.getElementById('newName').value.trim();
  const cid  = document.getElementById('newCid').value.trim();
  const desc = document.getElementById('newDesc').value.trim();
  if (!name || !cid) { addLog('채널명과 채널ID는 필수입니다', 'warning'); return; }
  if (!cid.startsWith('UC')) { addLog('채널ID는 UC로 시작해야 합니다', 'warning'); return; }
  const ch = {id: state.nextId++, name, desc: desc||'사용자 추가 채널', channelId: cid};
  state.channels.push(ch);
  saveState();
  closeAddForm();
  renderChannels();
  addLog(`✅ ${name} 채널 추가됨`, 'success');
}
function deleteChannel(id) {
  if (!confirm('채널을 삭제하시겠습니까?')) return;
  state.channels = state.channels.filter(c => c.id !== id);
  state.learned = state.learned.filter(i => i !== id);
  state.selected = state.selected.filter(i => i !== id);
  delete state.vidCounts[id];
  localStorage.removeItem(`subtitles_ch_${id}`);
  saveState();
  renderChannels();
  addLog('채널 삭제됨', 'warning');
}
function closeAddForm() {
  document.getElementById('addForm').classList.remove('show');
  document.getElementById('newName').value='';
  document.getElementById('newCid').value='';
  document.getElementById('newDesc').value='';
}

// ── 렌더링 ─────────────────────────────────────────
function renderChannels() {
  const list = document.getElementById('channelList');
  const showLearned = state.tab === 'done';
  const filtered = state.channels.filter(ch =>
    showLearned ? state.learned.includes(ch.id) : !state.learned.includes(ch.id)
  );

  list.innerHTML = filtered.map(ch => {
    const isSelected = state.selected.includes(ch.id);
    const isLearned  = state.learned.includes(ch.id);
    const isLearning = state.learning === ch.id;
    const vc = state.vidCounts[ch.id] || {};
    const total   = vc.total || 0;
    const learned = vc.learned || 0;
    const pct = total > 0 ? Math.round(learned/total*100) : (isLearned ? 100 : 0);

    let cardClass = 'channel-card';
    if (isSelected) cardClass += ' selected';
    if (isLearning) cardClass += ' learning';
    if (isLearned)  cardClass += ' done-card';

    const badge = isLearning
      ? `<span class="ch-badge learning">⚙️ ${state.learningStatus}</span>`
      : isLearned ? `<span class="ch-badge done">✅ 완료</span>` : '';

    const counts = total > 0 ? `
      <div class="ch-counts">
        <span>📹 동영상 ${vc.video||0}</span>
        <span>🩳 쇼츠 ${vc.shorts||0}</span>
        <span>🔴 라이브 ${vc.live||0}</span>
        <span style="color:#ff4444;">학습 ${learned}/${total}</span>
      </div>` : '';

    const dlBtn = isLearned
      ? `<button class="ch-act ch-act-dl" onclick="downloadTxt(${ch.id})">📥 txt</button>` : '';
    const delBtn = !isLearning
      ? `<button class="ch-act ch-act-del" onclick="deleteChannel(${ch.id})">✕</button>` : '';

    return `
      <div class="${cardClass}">
        <input type="checkbox" ${isSelected?'checked':''} ${isLearned||isLearning?'disabled':''} onchange="toggleChannel(${ch.id})">
        <div class="ch-info">
          <div class="ch-name">${ch.name}${badge}</div>
          <div class="ch-sub">${ch.desc}</div>
          ${counts}
        </div>
        <div class="mini-prog">
          <div class="mini-prog-hd"><span>${isLearning?state.learningStatus:'진행률'}</span><span style="color:#ff4444">${pct}%</span></div>
          <div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="ch-acts">${dlBtn}${delBtn}</div>
      </div>`;
  }).join('');

  updateStats();
  updateLearnBtn();
}

// ── 선택 ───────────────────────────────────────────
function toggleChannel(id) {
  id = Number(id);
  const idx = state.selected.indexOf(id);
  if (idx > -1) state.selected.splice(idx,1); else state.selected.push(id);
  renderChannels();
}
function selectAll() {
  state.selected = state.channels.filter(c => !state.learned.includes(c.id)).map(c=>c.id);
  renderChannels();
}
function deselectAll() { state.selected=[]; renderChannels(); }

// ── 통계 ───────────────────────────────────────────
function updateStats() {
  let totalVid=0, learnedVid=0;
  state.channels.forEach(ch => {
    const vc = state.vidCounts[ch.id]||{};
    totalVid += vc.total||0;
    learnedVid += vc.learned||0;
  });
  const pct = state.channels.length > 0 ? Math.round(state.learned.length/state.channels.length*100) : 0;
  document.getElementById('sTotalCh').textContent   = state.channels.length;
  document.getElementById('sLearned').textContent   = state.learned.length;
  document.getElementById('sTotalVid').textContent  = totalVid;
  document.getElementById('sLearnedVid').textContent= learnedVid;
  document.getElementById('sSelected').textContent  = state.selected.length;
  document.getElementById('progFill').style.width   = pct+'%';
  document.getElementById('progFill').textContent   = pct+'%';
}
function updateLearnBtn() {
  document.getElementById('learnBtn').disabled = state.selected.length===0 || state.learning!==null;
  document.getElementById('autoBtn').disabled  = state.learning!==null;
}

// ── 로그 ───────────────────────────────────────────
function addLog(msg, type='info') {
  const t = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  state.logs.unshift({t, msg, type});
  if (state.logs.length>80) state.logs.pop();
  const container = document.getElementById('logEntries');
  const el = document.createElement('div');
  el.className = `log-entry ${type}`;
  el.innerHTML = `<span class="t">[${t}]</span>${msg}`;
  container.insertBefore(el, container.firstChild);
  saveState();
}

// ── YouTube API - 영상 목록 ────────────────────────
async function fetchVideos(channelId) {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { addLog('API 키 없음', 'warning'); return []; }
  try {
    const res = await fetch(`${LOCAL_SERVER}/videos?channelId=${channelId}&apiKey=${apiKey}`);
    const data = await res.json();
    if (data.error) { addLog(`❌ ${data.error}`, 'error'); return []; }
    return data.videos || [];
  } catch(e) {
    addLog(`❌ 서버 연결 실패: ${e.message}`, 'error');
    return [];
  }
}

// 영상 타입 판별 (쇼츠: 60초 이하 or #Shorts, 라이브: liveBroadcastContent)
function classifyVideo(v) {
  if (v.liveBroadcastContent === 'live' || v.liveBroadcastContent === 'completed') return 'live';
  if (v.duration && v.duration <= 60) return 'shorts';
  if (v.title && v.title.toLowerCase().includes('#shorts')) return 'shorts';
  return 'video';
}

let stopFlag = false;

// 자막 추출
async function fetchSubtitle(videoId, title) {
  try {
    const res = await fetch(`${LOCAL_SERVER}/subtitle?videoId=${videoId}`, {signal: AbortSignal.timeout(180000)});
    const data = await res.json();
    if (data.skip) {
      addLog(`  ⏭️ 이미학습: ${title.substring(0,22)}`, 'info');
      return null;
    }
    if (data.success) {
      const method = data.method === 'whisper' ? '🎙️Whisper' : '📝자막';
      addLog(`  ${method}: ${title.substring(0,22)}`, 'success');
      return data.text;
    } else {
      addLog(`  ⚠️ 실패: ${title.substring(0,22)} (${data.error})`, 'warning');
      return null;
    }
  } catch(e) {
    addLog(`  ❌ ${e.message}`, 'error');
    return null;
  }
}

// ── 채널 학습 ─────────────────────────────────────
async function learnChannel(ch) {
  addLog(`━━━━━━━━━━━━━━━━━━━━━━━━━━━`, 'info');
  addLog(`${ch.name} 학습 시작`, 'loading');
  try {
    // 1. 영상 목록
    state.learningStatus = '영상 목록 수집중...';
    renderChannels();
    const videos = await fetchVideos(ch.channelId);
    if (!videos.length) {
      addLog('❌ 영상 없음 또는 API 오류', 'error');
      return false;
    }

    // 2. 타입 분류
    const classified = videos.map(v => ({...v, type: classifyVideo(v)}));
    const shorts = classified.filter(v=>v.type==='shorts');
    const vids   = classified.filter(v=>v.type==='video');
    const lives  = classified.filter(v=>v.type==='live');

    // 선택된 타입만 학습 (쇼츠 우선)
    const toLearn = [
      ...(state.typeFilter.shorts ? shorts : []),
      ...(state.typeFilter.video  ? vids   : []),
      ...(state.typeFilter.live   ? lives  : [])
    ];

    // 카운트 저장
    state.vidCounts[ch.id] = {
      total: toLearn.length,
      learned: 0,
      shorts: shorts.length,
      video: vids.length,
      live: lives.length
    };
    addLog(`📹 쇼츠 ${shorts.length} / 동영상 ${vids.length} / 라이브 ${lives.length} → 학습대상 ${toLearn.length}개`, 'info');

    // 3. 자막 추출 (중복 스킵)
    const subtitles = {};
    for (let i=0; i<toLearn.length; i++) {
      if (stopFlag) { addLog('⏹ 중지됨', 'warning'); return false; }
      const v = toLearn[i];
      if (v.already_learned) {
        addLog(`  ⏭️ 서버이미학습: ${v.title.substring(0,22)}`, 'info');
        state.vidCounts[ch.id].learned = i+1;
        renderChannels();
        continue;
      }
      state.learningStatus = `${i+1}/${toLearn.length}`;
      state.vidCounts[ch.id].learned = i;
      renderChannels();
      const text = await fetchSubtitle(v.videoId, v.title);
      if (text) subtitles[v.videoId] = {title: v.title, type: v.type, text};
    }

    // 4. 저장
    state.vidCounts[ch.id].learned = Object.keys(subtitles).length;
    localStorage.setItem(`subtitles_ch_${ch.id}`, JSON.stringify(subtitles));

    const ok = Object.keys(subtitles).length;
    addLog(`💾 ${ok}/${toLearn.length}개 자막 저장`, ok>0?'success':'warning');

    // 완료
    state.learned.push(ch.id);
    state.learning = null;
    state.learningStatus = '';
    saveState();
    addLog(`✅ ${ch.name} 완료!`, 'success');
    renderChannels();

    // 자동 다운로드
    await sleep(300);
    downloadTxt(ch.id);
    return true;

  } catch(e) {
    addLog(`❌ ${ch.name} 실패: ${e.message}`, 'error');
    state.learning = null;
    state.learningStatus = '';
    renderChannels();
    return false;
  }
}

// ── 학습 시작 ─────────────────────────────────────
async function startLearning(ids) {
  const toLearn = (ids || state.selected.map(Number)).filter(id => !state.learned.includes(id));
  if (!toLearn.length) { addLog('학습할 채널 없음', 'warning'); return; }
  state.apiKey = document.getElementById('apiKey').value.trim();
  saveState();
  stopFlag = false;
  document.getElementById('stopBtn').style.display = 'inline-block';
  addLog(`▶ 총 ${toLearn.length}개 채널 학습 시작`, 'info');

  for (let i=0; i<toLearn.length; i++) {
    if (stopFlag) { addLog('⏹ 자동학습 중지됨', 'warning'); break; }
    const ch = state.channels.find(c=>c.id===toLearn[i]);
    if (!ch) continue;
    state.learning = ch.id;
    renderChannels();
    updateLearnBtn();
    addLog(`[${i+1}/${toLearn.length}] ${ch.name}`, 'loading');
    await learnChannel(ch);
    await sleep(400);
  }

  stopFlag = false;
  state.selected = [];
  state.learning = null;
  document.getElementById('stopBtn').style.display = 'none';
  renderChannels();
  updateLearnBtn();
  addLog(`🎉 전체 완료! (${state.learned.length}개 채널)`, 'success');
}

// 자동학습: 미학습 전체
function autoLearn() {
  const ids = state.channels.filter(c=>!state.learned.includes(c.id)).map(c=>c.id);
  if (!ids.length) { addLog('학습할 채널 없음', 'warning'); return; }
  addLog(`⚡ 자동학습: ${ids.length}개 채널`, 'info');
  startLearning(ids);
}

// ── txt 다운로드 ───────────────────────────────────
function downloadTxt(chId) {
  chId = Number(chId);
  const ch = state.channels.find(c=>c.id===chId);
  const raw = localStorage.getItem(`subtitles_ch_${chId}`);
  if (!raw) { addLog('저장된 자막 없음', 'warning'); return; }
  const subs = JSON.parse(raw);
  const typeEmoji = {shorts:'🩳', video:'🎬', live:'🔴'};
  let content = `=== ${ch.name} 자막 모음 ===\n추출일: ${new Date().toLocaleString('ko-KR')}\n총 ${Object.keys(subs).length}개 영상\n\n`;
  // 쇼츠 → 동영상 → 라이브 순서
  ['shorts','video','live'].forEach(type => {
    const items = Object.entries(subs).filter(([,v])=>v.type===type);
    if (!items.length) return;
    content += `\n${'═'.repeat(50)}\n${typeEmoji[type]} ${type.toUpperCase()} (${items.length}개)\n${'═'.repeat(50)}\n`;
    items.forEach(([vid, info]) => {
      content += `\n▶ ${info.title}\nhttps://youtu.be/${vid}\n${'─'.repeat(40)}\n${info.text}\n`;
    });
  });
  const blob = new Blob([content], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${ch.name}_자막.txt`;
  a.click();
  addLog(`📥 ${ch.name} 다운로드됨`, 'success');
}

// ── 초기화 ────────────────────────────────────────
function resetAll() {
  if (!confirm('모든 학습 기록을 초기화하시겠습니까?')) return;
  state.learned = [];
  state.selected = [];
  state.vidCounts = {};
  state.logs = [];
  saveState();
  renderChannels();
  document.getElementById('logEntries').innerHTML = '';
  addLog('초기화 완료', 'warning');
}

function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

// ── 이벤트 ────────────────────────────────────────
document.getElementById('stopBtn').addEventListener('click', () => {
  stopFlag = true;
  addLog('⏹ 중지 요청됨 (현재 영상 완료 후 중지)', 'warning');
});
document.getElementById('learnBtn').addEventListener('click', () => startLearning());
document.getElementById('autoBtn').addEventListener('click', autoLearn);
document.getElementById('selAllBtn').addEventListener('click', selectAll);
document.getElementById('deselAllBtn').addEventListener('click', deselectAll);
document.getElementById('resetBtn').addEventListener('click', resetAll);
document.getElementById('addBtn').addEventListener('click', () => {
  document.getElementById('addForm').classList.toggle('show');
});
document.getElementById('apiKey').addEventListener('change', () => {
  state.apiKey = document.getElementById('apiKey').value.trim();
  saveState();
  addLog('API 키 저장됨', 'info');
});

// ── 초기 실행 ─────────────────────────────────────
loadState();
// 로그 복원
state.logs.forEach(log => {
  const el = document.createElement('div');
  el.className = `log-entry ${log.type}`;
  el.innerHTML = `<span class="t">[${log.t}]</span>${log.msg}`;
  document.getElementById('logEntries').appendChild(el);
});
renderChannels();
addLog('주식구독러너 시작', 'success');
</script>
