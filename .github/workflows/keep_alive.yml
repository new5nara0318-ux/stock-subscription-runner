name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'  # 5분마다
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.RENDER_URL }}/ping)
          echo "응답코드: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ 서버 정상"
          else
            echo "❌ 서버 응답 없음: $STATUS"
          fi
